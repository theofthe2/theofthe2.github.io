<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play GTA 2 in Browser</title>
    <script src="https://jsdos.io/js-dos.js"></script>
</head>
<body>
    <div id="jsdos"></div>
    <script>
        const jsdos = new JSDos({
            container: document.getElementById('jsdos'),
            gameUrl: 'https://your-repository.github.io/path/to/gta2-game-files.zip', // Point to your game files
            gameArgs: ['-fullscreen'] // You can customize it
        });
    </script>
</body>
</html>
