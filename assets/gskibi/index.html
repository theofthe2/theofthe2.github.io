<!DOCTYPE html><html lang="en-us"><head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Grand Skibidi Town</title>
    <link rel="shortcut icon" href="images/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/gamepix.sdk.js"></script>
    <script src="js/UnityProgress.js"></script>  
    <script src="js/UnityLoader.js"></script>
    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "Build/game.json", {onProgress: UnityProgress});
    </script>
  <script type="text/javascript" src="js/fb.js"></script><style>
    
    body {
      background: transparent !important;
    }
 
    .gpxForce-bckgr-gamefrm {
      background-image: url("images/medium.png"), url("images/small.png") !important;
      width: 100%;
      height: 100%;
      -webkit-filter: blur(20px);
      filter: blur(20px);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background-position: 50% !important;
      background-repeat: no-repeat !important;
      background-size: cover !important;
      position: absolute;
      top: 0;
      left: 0;
      -webkit-transform: scale(1.3);
      transform: scale(1.3);
      z-index: -1;
      opacity: 1;
    }

  </style>
</head>
  <body>
    <div class="webgl-content">
      <div id="gameContainer" style="width: 960px; height: 600px"></div>
      <div class="footer">
        <div class="webgl-logo"></div>
        <div class="fullscreen" onclick="gameInstance.SetFullscreen(1)"></div>
        <div class="title">Grand Skibidi Town</div>
      </div>
    </div>
  
<div class="gpxForce-bckgr-gamefrm"></div></body></html>
